<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=300, initial-scale=1.0">
    <title>Fanny Ice Cream Banner</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- 300x250 Banner -->
    <div class="banner-container">

        <!-- Background -->
        <img src="assets/bg.jpg" class="banner-layer bg-img" loading="lazy">
        <!-- Light Rays -->
        <img src="assets/quat.png" class="banner-layer quat-img" loading="lazy">
        <!-- Wheel -->
        <div class="wheel-wrapper"> <img src="assets/vongquay.png" class="wheel-img" loading="lazy"> </div>
        <!-- 🎁 Gifts (LAYER RIÊNG - ĐÚNG) -->
        <img src="assets/qua.png" class="banner-layer gifts-img" loading="lazy">
        <!-- Pointer --> <img src="assets/muiten.png" class="banner-layer pointer-img" loading="lazy">
        <!-- Logo -->
        <img src="assets/logo.png" class="banner-layer logo-img" loading="lazy">
        <!-- Title --> <img src="assets/title.png" class="banner-layer title-img" loading="lazy">
        <!-- Text --> <img src="assets/text.png" class="banner-layer text-img" loading="lazy">
        <!-- CTA --> <a href="https://fanny.com.vn" target="_blank"> <img src="assets/cta.png"
                class="banner-layer cta-img" loading="lazy"> </a>

    </div>

</body>

</html>
